services:
  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fastapi_db
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - fastapi-network
  app:
    build: .
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+aiomysql://user:userpassword@db/fastapi_db
    volumes:
      - ./app:/app
    networks:
      - fastapi-network

volumes:
  db_data:
    driver: local

networks:
  fastapi-network:
    driver: bridge
